<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'">
<title>支援士クエスト — 情報処理安全確保支援士 ゲーミング学習</title>
<style>
  :root{
    --bg:#0a0f1e; --panel:#141b30; --panel2:#1c2542; --line:#2a3660;
    --text:#eef1fb; --sub:#94a0c8;
    --cry:#4f8ef7; --auth:#3ecf8e; --atk:#f75f6d; --net:#4fd1e0;
    --dev:#f7a44f; --law:#b48ef7; --ops:#ffd166;
    --gold:#ffd166; --ok:#3ecf8e; --ng:#f75f6d;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    background:radial-gradient(1200px 600px at 50% -100px,#132045,var(--bg));
    color:var(--text); min-height:100vh;
  }
  #app{max-width:540px;margin:0 auto;padding:16px 16px 96px;}
  h1{font-size:21px} h2{font-size:17px;margin-bottom:10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;}
  .row{display:flex;align-items:center;gap:10px;}
  .grow{flex:1}
  .sub{color:var(--sub);font-size:13px;line-height:1.6}
  .big{font-size:26px;font-weight:800}
  button{
    font-family:inherit;border:none;border-radius:14px;cursor:pointer;
    font-size:16px;font-weight:700;color:var(--text);
  }
  .btn-main{
    width:100%;padding:16px;background:linear-gradient(135deg,#3d6ef7,#7b4ff7);
    box-shadow:0 6px 20px rgba(80,100,250,.35);margin-top:6px;
  }
  .btn-main:active{transform:scale(.98)}
  .btn-mock{
    width:100%;padding:16px;background:linear-gradient(135deg,#f7734f,#f74f8e);
    box-shadow:0 6px 20px rgba(247,100,110,.3);margin-top:6px;
  }
  .btn-mock:active{transform:scale(.98)}
  .btn-sub{width:100%;padding:13px;background:var(--panel2);border:1px solid var(--line);margin-top:8px;}
  .btn-ghost{background:none;color:var(--sub);font-size:14px;padding:8px;font-weight:600}
  .xpbar{height:12px;background:#080d1c;border-radius:99px;overflow:hidden;border:1px solid var(--line)}
  .xpbar>div{height:100%;background:linear-gradient(90deg,#ffd166,#ff9f43);transition:width .5s}
  .masterybar{height:8px;background:#080d1c;border-radius:99px;overflow:hidden}
  .masterybar>div{height:100%;transition:width .5s}
  .pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;background:var(--panel2);border:1px solid var(--line)}
  .qtext{font-size:18px;font-weight:700;line-height:1.7;margin:14px 0 18px}
  .choice{
    display:block;width:100%;text-align:left;padding:14px 16px;margin-bottom:10px;
    background:var(--panel2);border:2px solid var(--line);border-radius:14px;
    font-size:15px;font-weight:600;line-height:1.5;
  }
  .choice:active{transform:scale(.99)}
  .choice.correct{border-color:var(--ok);background:rgba(62,207,142,.15)}
  .choice.wrong{border-color:var(--ng);background:rgba(247,95,109,.15)}
  .choice.dim{opacity:.45}
  .feedback{border-radius:14px;padding:14px;margin-top:6px;font-size:14px;line-height:1.7;animation:pop .25s}
  .feedback.ok{background:rgba(62,207,142,.12);border:1px solid var(--ok)}
  .feedback.ng{background:rgba(247,95,109,.12);border:1px solid var(--ng)}
  @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .progress{height:10px;background:#080d1c;border-radius:99px;overflow:hidden;margin:8px 0 4px}
  .progress>div{height:100%;background:linear-gradient(90deg,#3ecf8e,#4f8ef7);transition:width .3s}
  nav{
    position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,30,.95);
    border-top:1px solid var(--line);backdrop-filter:blur(8px);z-index:10;
  }
  nav .inner{max-width:540px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;padding:10px 4px 14px;font-size:11px;color:var(--sub);font-weight:600}
  nav button.active{color:var(--gold)}
  nav .ico{display:block;font-size:20px;margin-bottom:2px}
  .badge{
    display:flex;gap:12px;align-items:center;background:var(--panel2);
    border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;
  }
  .badge.locked{opacity:.4;filter:grayscale(1)}
  .badge .bemoji{font-size:30px}
  .unit-btn{
    display:flex;align-items:center;gap:10px;width:100%;padding:13px 14px;margin-bottom:8px;
    background:var(--panel2);border:1px solid var(--line);border-radius:12px;text-align:left;font-size:15px;
  }
  .streak-flame{font-size:34px;filter:drop-shadow(0 0 8px rgba(255,160,60,.6))}
  .guide h3{font-size:15px;margin:16px 0 6px;color:var(--gold)}
  .guide p{font-size:14px;line-height:1.8;color:#cdd5ef}
  .guide cite{display:block;font-size:12px;color:var(--sub);margin-top:4px;font-style:normal}
  .result-emoji{font-size:56px;text-align:center;margin:10px 0}
  .stat3{display:flex;text-align:center;margin:14px 0}
  .stat3>div{flex:1}
  .stat3 .v{font-size:22px;font-weight:800}
  .stat3 .k{font-size:12px;color:var(--sub)}
  .duechip{font-size:12px;color:var(--sub)}
  .center{text-align:center}
  .passbig{font-size:34px;font-weight:900;text-align:center;margin:6px 0}
  a{color:#8fb3ff}
</style>
</head>

<nav><div class="inner" id="nav"></div></nav>

<script>
"use strict";
/* =====================================================================
   支援士クエスト — 情報処理安全確保支援士（SC）対策
   学習メカニズム:
   - 間隔反復 (Ebbinghaus 1885; Cepeda et al. 2006)
   - 検索練習・テスト効果 (Roediger & Karpicke 2006)
   - 即時フィードバック (Hattie & Timperley 2007)
   - インターリービング (Rohrer & Taylor 2007)
   - 習慣化・動機づけ (Deci & Ryan; Hamari et al. 2014)
   ===================================================================== */

const CATS = {
  cry :{name:"暗号技術",       emoji:"🔐", color:"var(--cry)"},
  auth:{name:"認証・認可",     emoji:"🪪", color:"var(--auth)"},
  atk :{name:"攻撃手法",       emoji:"⚔️", color:"var(--atk)"},
  net :{name:"ネットワーク防御",emoji:"🌐", color:"var(--net)"},
  dev :{name:"セキュア開発",   emoji:"🛡️", color:"var(--dev)"},
  law :{name:"管理・法規",     emoji:"⚖️", color:"var(--law)"},
  ops :{name:"運用・対応",     emoji:"🚨", color:"var(--ops)"},
};

/* 問題バンク: c[0]が正解（表示時にシャッフル） */
const BANK = [
/* ===== 暗号技術・共通鍵と公開鍵 ===== */
{s:"cry",u:"共通鍵と公開鍵",q:"AESに関する記述として、適切なものはどれ？",c:["共通鍵方式のブロック暗号で、鍵長は128/192/256ビットから選べる","公開鍵方式の暗号で、素因数分解の困難性を利用している","ハッシュ関数の一種で、256ビットの値を出力する","ディジタル署名専用のアルゴリズムである"],e:"AESはDESの後継として標準化された共通鍵ブロック暗号です。ブロック長128ビット、鍵長は3種類から選べます。"},
{s:"cry",u:"共通鍵と公開鍵",q:"公開鍵暗号方式で、秘密のメッセージを相手に送るとき、暗号化に使う鍵は？",c:["受信者の公開鍵","送信者の公開鍵","受信者の秘密鍵","送信者の秘密鍵"],e:"受信者の公開鍵で暗号化すれば、対になる秘密鍵を持つ受信者だけが復号できます。署名との使い分けが頻出です！"},
{s:"cry",u:"共通鍵と公開鍵",q:"RSA暗号の安全性の根拠となっている数学的問題は？",c:["大きな数の素因数分解の困難性","楕円曲線上の離散対数問題","ハッシュ値の衝突発見の困難性","巡回セールスマン問題"],e:"RSAは巨大な合成数の素因数分解が現実的な時間で解けないことを安全性の根拠にしています。"},
{s:"cry",u:"共通鍵と公開鍵",q:"楕円曲線暗号（ECC）の特徴として適切なものは？",c:["RSAより短い鍵長で同等の安全性を実現できる","共通鍵暗号なので処理が高速である","鍵長はRSAより長くする必要がある","ハッシュ関数の一種である"],e:"同じ安全性ならRSA 2048ビットに対しECCは256ビット程度。処理が軽く、TLSやスマホで広く使われています。"},
{s:"cry",u:"共通鍵と公開鍵",q:"ハイブリッド暗号方式の説明として適切なものは？",c:["データ本体は共通鍵暗号で暗号化し、その共通鍵を公開鍵暗号で安全に受け渡す","データを共通鍵と公開鍵で二重に暗号化する","送信者と受信者で異なる暗号アルゴリズムを使う","ハッシュ値と暗号文を交互に送る"],e:"高速な共通鍵暗号と、鍵配送が容易な公開鍵暗号の長所を組み合わせた方式。TLSでも使われています。"},
{s:"cry",u:"共通鍵と公開鍵",q:"Diffie-Hellman鍵交換の説明として適切なものは？",c:["盗聴されている通信路上でも、両者だけが知る共通の値を作り出せる","公開鍵で暗号化した共通鍵を直接送信する","事前に郵送などで共通鍵を配送しておく","パスワードから共通鍵を生成する"],e:"離散対数問題の困難性を利用した鍵共有法。ただし相手の確認をしないと中間者攻撃を受けるため、認証との併用が必要です。"},
{s:"cry",u:"共通鍵と公開鍵",q:"共通鍵暗号でn人が互いに1対1の秘密通信をするとき、必要な鍵の総数は？",c:["n(n−1)/2","n","2n","n²"],e:"全ペアに1個ずつ必要なので10人なら45個。人数が増えると鍵管理が破綻するのが共通鍵方式の弱点です。"},
{s:"cry",u:"共通鍵と公開鍵",q:"CRYPTREC暗号リストの説明として適切なものは？",c:["国が安全性を評価し、電子政府での利用を推奨する暗号技術のリスト","民間企業が独自に策定した暗号製品のカタログ","解読されて使用禁止になった暗号のリスト","暗号資産（仮想通貨）の取引所一覧"],e:"CRYPTRECはデジタル庁・総務省・経済産業省が運営する暗号技術の評価プロジェクト。安全な暗号選定の拠り所です。"},
/* ===== 暗号技術・ハッシュと署名 ===== */
{s:"cry",u:"ハッシュと署名",q:"ハッシュ関数の「一方向性」とはどんな性質？",c:["ハッシュ値から元のデータを求めることが困難な性質","同じデータからは常に異なるハッシュ値が出る性質","データが長いほどハッシュ値も長くなる性質","一度計算したら二度と計算できない性質"],e:"原像計算困難性とも呼ばれます。ハッシュ値は固定長で、元データの復元はできません。"},
{s:"cry",u:"ハッシュと署名",q:"ハッシュ関数の「衝突発見困難性」とはどんな性質？",c:["同じハッシュ値になる異なる2つのデータを見つけることが困難な性質","ハッシュ値どうしの足し算ができない性質","2つのハッシュ関数を同時に使えない性質","ハッシュ値が偶然一致することが絶対にない性質"],e:"完全に衝突をなくすことは原理的に不可能ですが、「見つけるのが計算量的に困難」であることが安全性の要件です。"},
{s:"cry",u:"ハッシュと署名",q:"デジタル署名を作成するときに使う鍵は？",c:["送信者（署名者）の秘密鍵","送信者の公開鍵","受信者の秘密鍵","受信者の公開鍵"],e:"署名者だけが持つ秘密鍵で署名し、誰でも入手できる公開鍵で検証します。暗号化とは鍵の使い方が逆なので注意！"},
{s:"cry",u:"ハッシュと署名",q:"デジタル署名で実現【できない】ものはどれ？",c:["データの機密性（盗聴防止）","データが改ざんされていないことの確認","署名者が本人であることの確認","署名した事実の否認防止"],e:"署名は完全性・真正性・否認防止を提供しますが、暗号化ではないので中身は見えたまま。機密性には暗号化が必要です。"},
{s:"cry",u:"ハッシュと署名",q:"HMACの説明として適切なものは？",c:["共通鍵とハッシュ関数を組み合わせて、メッセージの改ざんと送信元を確認する技術","公開鍵でメッセージに署名して否認防止を実現する技術","メッセージを圧縮して通信量を減らす技術","パスワードを暗号化して保存する技術"],e:"鍵を共有する2者間の改ざん検知に使います。両者が同じ鍵を持つため、第三者に対する否認防止はできません。"},
{s:"cry",u:"ハッシュと署名",q:"パスワードをハッシュ化して保存する際にソルトを付ける目的は？",c:["レインボーテーブルなど事前計算による解読を困難にするため","ハッシュ値を短くして保存領域を節約するため","パスワードの入力ミスを検出するため","同じパスワードを設定できないようにするため"],e:"利用者ごとに異なるランダム値を付けることで、同じパスワードでも異なるハッシュ値になり、事前計算表が無効化されます。"},
{s:"cry",u:"ハッシュと署名",q:"ストレッチングの説明として適切なものは？",c:["ハッシュ計算を数千回以上繰り返し、総当たり攻撃に必要な時間を増やす手法","ハッシュ値を引き伸ばして長くする手法","パスワードの有効期限を延長する手法","暗号鍵を複数のサーバに分散する手法"],e:"1回の検証は一瞬でも、攻撃者の総当たりは数千倍遅くなります。ソルトとセットで使うのが定石です。"},
{s:"cry",u:"ハッシュと署名",q:"タイムスタンプ（時刻認証）で証明できることは？",c:["その時刻にデータが存在し、それ以降改ざんされていないこと","データを誰が作成したかということ","データが正しい内容であること","データがいつ削除されたかということ"],e:"存在証明と完全性証明のセット。電子契約や知的財産の先使用権の証明などに使われます。"},
/* ===== 暗号技術・PKIとTLS ===== */
{s:"cry",u:"PKIとTLS",q:"デジタル証明書の役割として適切なものは？",c:["公開鍵とその持ち主の対応を認証局（CA）が保証する","秘密鍵を安全に保管する","通信データを暗号化する","パスワードの強度を証明する"],e:"「この公開鍵は確かに○○のもの」とCAが署名付きで保証するのが証明書。PKIの信頼の基盤です。"},
{s:"cry",u:"PKIとTLS",q:"CRL（証明書失効リスト）の説明として適切なものは？",c:["有効期限内に失効させられた証明書のシリアル番号の一覧","有効期限が切れた証明書の一覧","発行済みのすべての証明書の一覧","信頼できる認証局の一覧"],e:"秘密鍵の漏えいなどで期限前に無効化された証明書を公開するリスト。期限切れは載りません。"},
{s:"cry",u:"PKIとTLS",q:"OCSPの説明として適切なものは？",c:["証明書が失効していないかをオンラインでリアルタイムに確認するプロトコル","証明書を自動で更新するプロトコル","認証局どうしが相互に署名するプロトコル","秘密鍵をバックアップするプロトコル"],e:"CRL全体をダウンロードせず、特定の証明書の失効状態だけを問い合わせられるので軽量です。"},
{s:"cry",u:"PKIとTLS",q:"ルート認証局（ルートCA）の証明書は、どのように署名されている？",c:["ルートCA自身の秘密鍵による自己署名","上位の認証局による署名","政府機関による署名","利用者の秘密鍵による署名"],e:"ルートCAは信頼の起点なので上位が存在せず自己署名。OSやブラウザにあらかじめ組み込まれることで信頼されます。"},
{s:"cry",u:"PKIとTLS",q:"TLSが提供する機能の組合せとして適切なものは？",c:["通信の暗号化・改ざん検知・サーバ認証","通信の暗号化のみ","ウイルス検知と通信の暗号化","利用者のパスワード管理と暗号化"],e:"暗号化（機密性）、MACによる完全性、証明書によるサーバ認証の3点セット。クライアント認証も可能です。"},
{s:"cry",u:"PKIとTLS",q:"前方秘匿性（Forward Secrecy）の説明として適切なものは？",c:["サーバの秘密鍵が将来漏えいしても、過去の通信は解読されないという性質","過去の通信記録を自動的に削除する機能","暗号化を通信の前方部分だけに適用する方式","秘密鍵を前もって複数作っておく運用"],e:"ECDHEなどの一時的な鍵交換をセッションごとに行うことで実現。TLS 1.3では必須になりました。"},
{s:"cry",u:"PKIとTLS",q:"サーバ証明書の検証でブラウザが行うこととして適切なものは？",c:["信頼するルートCAまで署名の連鎖をたどって検証する","サーバに秘密鍵の提出を求めて照合する","証明書のハッシュ値を利用者に目視確認させる","認証局に電話で問い合わせる"],e:"サーバ証明書→中間CA→ルートCAと署名を検証していく「証明書チェーン」の検証が基本です。"},
/* ===== 認証・認可・認証方式 ===== */
{s:"auth",u:"認証方式",q:"多要素認証の正しい組合せの例はどれ？",c:["パスワードと、スマートフォンの認証アプリのコード","パスワードと、秘密の質問","2種類の異なるパスワード","指紋認証と顔認証"],e:"知識・所持・生体のうち異なる2要素以上を組み合わせるのが多要素認証。同じ要素を2つ並べても多要素にはなりません。"},
{s:"auth",u:"認証方式",q:"TOTP方式のワンタイムパスワードの説明として適切なものは？",c:["現在時刻を基に生成され、短時間だけ有効なパスワード","1文字ずつ順番に入力するパスワード","一度設定したら変更できないパスワード","利用のたびにサーバから郵送されるパスワード"],e:"時刻と共有シークレットから30秒ごとに生成。盗まれてもすぐ無効になるのが強みです。"},
{s:"auth",u:"認証方式",q:"チャレンジレスポンス認証の利点は？",c:["パスワードそのものをネットワークに流さずに認証できる","パスワードを覚える必要がなくなる","サーバにパスワードを保存する必要がなくなる","通信をすべて暗号化できる"],e:"サーバから届くチャレンジ（乱数）とパスワードから計算した応答だけを送るため、盗聴されてもパスワードは漏れません。"},
{s:"auth",u:"認証方式",q:"FIDO認証（パスキー）の特徴として適切なものは？",c:["生体情報や秘密鍵は利用者の端末内に保存され、サーバへ送信されない","生体情報をサーバに登録して照合する","パスワードを暗号化してサーバに送る","認証のたびにSMSで確認コードが届く"],e:"サーバには公開鍵しか渡らないので、サーバが侵害されても秘密は漏れません。フィッシングにも強い方式です。"},
{s:"auth",u:"認証方式",q:"リスクベース認証の説明として適切なものは？",c:["普段と異なる端末や場所からのアクセス時にだけ追加の認証を求める方式","リスクの高いサービスでは長いパスワードを義務付ける方式","ログイン失敗が続いたらアカウントをロックする方式","パスワードの強度を点数で表示する方式"],e:"利便性を保ちつつ、不正ログインの疑いが高いときだけ認証を強化する仕組みです。"},
{s:"auth",u:"認証方式",q:"生体認証で本人拒否率（FRR）を下げるように調整すると、一般にどうなる？",c:["他人受入率（FAR）が上がる","他人受入率（FAR）も下がる","認証速度が遅くなる","登録できる人数が減る"],e:"FRRとFARはトレードオフの関係。判定のしきい値を緩めれば本人は通りやすくなりますが、他人も通りやすくなります。"},
{s:"auth",u:"認証方式",q:"SAMLを使ったシングルサインオンの仕組みとして適切なものは？",c:["認証を担うIdPが発行するアサーションを、サービス側（SP）が検証してログインさせる","すべてのサービスに同じパスワードを自動入力する","ブラウザにパスワードを保存して使い回す","一度ログインしたらセッションを無期限に保つ"],e:"IdP（Identity Provider）が認証結果をアサーションとして発行し、各SPはそれを信頼します。クラウドサービス連携の定番です。"},
{s:"auth",u:"認証方式",q:"OAuth 2.0の説明として適切なものは？",c:["パスワードを渡すことなく、アプリに自分のデータへの限定的なアクセス権を与える認可の仕組み","パスワードを暗号化して送信する認証プロトコル","ワンタイムパスワードの生成規格","生体認証の国際標準規格"],e:"OAuthは「認証」ではなく「認可」の仕組み。アクセストークンで権限の範囲と期限を限定できるのがポイントです。"},
{s:"auth",u:"認証方式",q:"パスワードリスト攻撃が成功してしまう主な原因は？",c:["複数のサービスで同じパスワードを使い回している利用者が多いから","パスワードが暗号化されずに通信されるから","パスワードの文字数が足りないから","サーバの処理速度が速いから"],e:"どこかで漏れたID・パスワードの組を他のサービスで試す攻撃。使い回しをやめることが最大の防御です。"},

{s:"auth",u:"アクセス制御",q:"最小権限の原則の説明として適切なものは？",c:["業務に必要な最小限の権限だけを利用者に与える","最も権限の小さい人に仕事を集中させる","管理者権限を持つ人を1人だけにする","すべての利用者の権限を同じにする"],e:"不正やマルウェア感染が起きても被害範囲を最小限に抑えられます。アクセス制御の最重要原則です。"},
{s:"auth",u:"アクセス制御",q:"ロールベースアクセス制御（RBAC）の説明として適切なものは？",c:["役割（ロール）に権限を割り当て、利用者にはロールを割り当てる方式","利用者一人ひとりに個別に権限を設定する方式","部屋への入退室をICカードで制御する方式","時間帯によってアクセス可否を変える方式"],e:"「経理担当」「管理者」などのロール単位で権限を管理するため、人事異動時の設定変更が容易で漏れも防げます。"},
{s:"auth",u:"アクセス制御",q:"職務分掌（Segregation of Duties）の目的として適切なものは？",c:["申請者と承認者を分けるなど、1人だけで不正が完結しないようにする","仕事を細かく分けて効率を上げる","部署ごとに使うシステムを分ける","休暇中の担当者の仕事を代行できるようにする"],e:"取引の申請と承認、開発と本番反映などを別の人に分けることで、単独での不正や誤りを防ぎます。"},
{s:"auth",u:"アクセス制御",q:"特権ID（管理者アカウント）の適切な管理方法は？",c:["共用を避けて利用者を特定できるようにし、操作ログを記録する","覚えやすいように全員で同じパスワードを共有する","便利なので日常業務でも常に特権IDを使う","パスワードを設定せず物理的な鍵で守る"],e:"「誰がいつ何をしたか」を追跡できることが重要。必要なときだけ貸し出す申請制の運用も有効です。"},

{s:"atk",u:"マルウェア・標的型",q:"ランサムウェアの「二重恐喝（ダブルエクストーション）」とは？",c:["データを暗号化した上で、窃取したデータの公開でも脅迫する手口","身代金を2回に分けて要求する手口","2種類のランサムウェアに同時感染させる手口","経営者と担当者の両方を脅迫する手口"],e:"バックアップから復旧できても「データを公開するぞ」と脅されるため、バックアップだけでは対策が完結しません。"},
{s:"atk",u:"マルウェア・標的型",q:"標的型攻撃メールの特徴として適切なものは？",c:["業務に関係がありそうな件名や実在の取引先を装い、特定の組織を狙う","不特定多数に同じ文面を大量にばらまく","件名や本文が明らかに不自然な日本語である","必ず実行形式（.exe）のファイルが添付されている"],e:"近年は日本語も自然で、業務メールと見分けがつきにくいのが特徴。「怪しいメール」に見えないことが最大の脅威です。"},
{s:"atk",u:"マルウェア・標的型",q:"C&C（C2）サーバの説明として適切なものは？",c:["感染した端末に攻撃者が指令を送り、遠隔操作するためのサーバ","ウイルス対策ソフトの定義ファイルを配信するサーバ","企業の機密情報を保管するサーバ","認証局が証明書を発行するサーバ"],e:"感染端末からC&Cサーバへの不審な外向き通信を検知することが、侵入発見の重要な手がかりになります。"},
{s:"atk",u:"マルウェア・標的型",q:"ボットネットの説明として適切なものは？",c:["マルウェアに感染し、攻撃者に遠隔操作される多数の機器のネットワーク","チャットボットを提供する事業者のネットワーク","社内のロボット端末を管理するネットワーク","検索エンジンのクローラの集合"],e:"DDoS攻撃や迷惑メール送信の踏み台にされます。IoT機器が乗っ取られてボット化する事例も増えています。"},
{s:"atk",u:"マルウェア・標的型",q:"ルートキットの説明として適切なものは？",c:["侵入後に攻撃者の活動の痕跡を隠蔽するためのツール群","OSの管理者パスワードを解析するツール","サーバのルートディレクトリを圧縮するツール","無線LANの電波を増幅する装置"],e:"プロセスやファイル、通信を見えなくして侵入を隠します。感染すると通常の手段では発見が困難になります。"},
{s:"atk",u:"マルウェア・標的型",q:"ファイルレスマルウェアの特徴として適切なものは？",c:["PowerShellなどOS標準ツールを悪用し、実行ファイルをディスクにほとんど残さない","ファイルサイズが極端に小さい","ファイルを1つも作成も削除もしない安全なプログラム","USBメモリからしか感染しない"],e:"ディスク上のファイルを検査する従来型の対策では見つけにくく、EDRなどの挙動監視が有効です。"},
{s:"atk",u:"マルウェア・標的型",q:"ワームの特徴として適切なものは？",c:["単独で動作し、ネットワーク経由で自己増殖する","他のプログラムに寄生しないと動作できない","有用なソフトを装って利用者に実行させる","感染してもデータを一切変更しない"],e:"脆弱性を悪用して自動で拡散するため、被害が急速に広がります。寄生型はウイルス、偽装型はトロイの木馬です。"},
{s:"atk",u:"マルウェア・標的型",q:"ゼロデイ攻撃の説明として適切なものは？",c:["修正プログラムが提供される前の脆弱性を悪用する攻撃","システム稼働初日に仕掛けられる攻撃","0時ちょうどに実行される攻撃","何日もかけずに一瞬で終わる攻撃"],e:"パッチが存在しないため防御が困難。多層防御やEDRによる侵入後の検知が重要になります。"},

{s:"atk",u:"Web攻撃",q:"SQLインジェクションの説明として適切なものは？",c:["入力欄に細工した文字列を与え、データベースを不正に操作する攻撃","大量のSQLを送りつけてサーバを停止させる攻撃","データベースのパスワードを総当たりする攻撃","SQLサーバの管理画面に不正ログインする攻撃"],e:"「' OR '1'='1」のような入力でSQL文の構造を変えてしまう攻撃。情報漏えい事故の定番原因です。"},
{s:"atk",u:"Web攻撃",q:"クロスサイトスクリプティング（XSS）の説明として適切なものは？",c:["脆弱なサイトを介して、利用者のブラウザで悪意あるスクリプトを実行させる攻撃","サーバ上のスクリプトファイルを書き換える攻撃","複数のサイトに同時にDDoS攻撃を行うこと","サイト間でクッキーを共有する正規の仕組み"],e:"エスケープ漏れが原因で、セッション情報の窃取や偽画面の表示につながります。攻撃されるのは閲覧者側です。"},
{s:"atk",u:"Web攻撃",q:"CSRF（クロスサイトリクエストフォージェリ）の説明として適切なものは？",c:["ログイン中の利用者に、意図しないリクエストを送信させて処理を実行させる攻撃","偽サイトでIDとパスワードを入力させる攻撃","サーバの設定ファイルを偽造する攻撃","リクエストを盗聴して内容を解析する攻撃"],e:"罠ページを踏むだけで、ログイン済みサイトへの送金や設定変更などが勝手に実行されます。対策はCSRFトークンです。"},
{s:"atk",u:"Web攻撃",q:"セッション固定化攻撃への対策として適切なものは？",c:["ログイン成功時にセッションIDを新しく発行し直す","セッションIDをURLに含めて管理する","セッションの有効期限を無期限にする","ログイン前にはセッションIDを発行しない設定にする"],e:"攻撃者が事前に知っているセッションIDを使わせる攻撃なので、ログイン成功のタイミングでIDを変えれば無効化できます。"},
{s:"atk",u:"Web攻撃",q:"ディレクトリトラバーサルの説明として適切なものは？",c:["「../」などでパスを遡り、公開を意図しないファイルにアクセスする攻撃","ディレクトリ内のファイルを大量にコピーして容量を圧迫する攻撃","ディレクトリの一覧を検索エンジンに登録する行為","フォルダ構成を勝手に変更するマルウェア"],e:"ファイル名をパラメータで受け取る処理が狙われます。パス文字列の検査と正規化が対策です。"},
{s:"atk",u:"Web攻撃",q:"クリックジャッキングの説明として適切なものは？",c:["透明にした別サイトのボタンを重ね、利用者に気づかせずクリックさせる攻撃","広告を高速で連打させる攻撃","マウスの動きを記録して盗む攻撃","偽の警告を表示して電話をかけさせる攻撃"],e:"iframeで正規サイトを透明に重ねる手口。X-Frame-OptionsやCSPのframe-ancestorsで埋め込みを禁止して防ぎます。"},
{s:"atk",u:"Web攻撃",q:"SSRF（サーバサイドリクエストフォージェリ）の説明として適切なものは？",c:["細工したリクエストを送り、サーバに内部システムへアクセスさせる攻撃","サーバのリクエストログを偽造する攻撃","サーバ証明書を偽造してなりすます攻撃","大量のリクエストでサーバを過負荷にする攻撃"],e:"URLを受け取って取得するような機能が悪用され、外部から直接届かない内部APIやクラウドのメタデータが狙われます。"},

{s:"atk",u:"ネットワーク攻撃",q:"DNSキャッシュポイズニングの説明として適切なものは？",c:["キャッシュDNSサーバに偽の情報を覚え込ませ、利用者を偽サイトへ誘導する攻撃","DNSサーバのキャッシュを削除して停止させる攻撃","DNSサーバに大量の問合せを送る攻撃","ドメイン名を勝手に登録する行為"],e:"正しいURLを入力しても偽サイトに接続されてしまう危険な攻撃。DNSSECや問合せポートのランダム化で対策します。"},
{s:"atk",u:"ネットワーク攻撃",q:"中間者攻撃（MITM）の説明として適切なものは？",c:["通信の間に割り込み、両者になりすまして盗聴・改ざんする攻撃","2人の攻撃者が交互に攻撃すること","社内の中間管理職を狙った標的型攻撃","通信の途中でケーブルを物理的に切断する攻撃"],e:"偽Wi-Fiアクセスポイントなどが典型例。TLSによるサーバ認証と暗号化が基本的な対策です。"},
{s:"atk",u:"ネットワーク攻撃",q:"リフレクション型DDoS攻撃の説明として適切なものは？",c:["送信元IPを標的に偽装した問合せを多数のサーバに送り、応答を標的に集中させる攻撃","標的のサーバを鏡のように複製する攻撃","攻撃を検知されたら即座に反射的に逃げる攻撃","レーザー光を反射させてケーブルを傷つける攻撃"],e:"DNSやNTPは応答が問合せより大きいため「増幅器」として悪用されます。オープンリゾルバの放置は加害に加担します。"},
{s:"atk",u:"ネットワーク攻撃",q:"ポートスキャンの説明として適切なものは？",c:["攻撃対象のサーバで稼働しているサービスを事前に調査する行為","サーバの空きディスク容量を調べる行為","LANケーブルの差し込み口を物理的に確認する行為","無線LANの電波強度を測定する行為"],e:"攻撃の準備段階で行われる偵察行為。不要なポートを閉じ、スキャンをIDSで検知することが対策です。"},
{s:"atk",u:"ネットワーク攻撃",q:"ARPスプーフィングの説明として適切なものは？",c:["偽のARP応答を流し、同一LAN内の通信を自分の端末経由にさせる攻撃","ARPテーブルを削除して通信を止める攻撃","無線LANのパスワードを解析する攻撃","ルータの設定を遠隔から書き換える攻撃"],e:"MACアドレスとIPアドレスの対応を偽ることでLAN内の中間者攻撃が成立します。"},

{s:"atk",u:"人を狙う攻撃",q:"フィッシングの説明として適切なものは？",c:["実在の企業を装ったメールなどで偽サイトへ誘導し、認証情報を入力させる攻撃","釣りサイトで個人情報を販売する行為","無差別に電話をかけて営業する行為","パスワードを総当たりで試す攻撃"],e:"金融機関や宅配業者を装う手口が定番。URLの確認とパスキーなどフィッシング耐性のある認証が対策です。"},
{s:"atk",u:"人を狙う攻撃",q:"ビジネスメール詐欺（BEC）の説明として適切なものは？",c:["経営者や取引先になりすまし、偽の送金指示メールで金銭をだまし取る攻撃","会社のメールサーバを乗っ取って停止させる攻撃","業務メールを大量に送って業務を妨害する攻撃","メールに広告を勝手に挿入する攻撃"],e:"「急ぎ」「極秘」で振込先変更を指示するのが典型。メール以外の手段での事実確認をルール化することが対策です。"},
{s:"atk",u:"人を狙う攻撃",q:"水飲み場型攻撃の説明として適切なものは？",c:["標的の組織がよく閲覧するWebサイトを改ざんして待ち伏せる攻撃","オフィスの給湯室で会話を盗み聞きする行為","水道などの重要インフラを狙う攻撃","湿気でサーバを故障させる攻撃"],e:"獲物が集まる水飲み場で待ち伏せる猛獣が名前の由来。正規サイト経由なので警戒されにくいのが特徴です。"},
{s:"atk",u:"人を狙う攻撃",q:"サプライチェーン攻撃の説明として適切なものは？",c:["対策が手薄な取引先や委託先を踏み台にして、本来の標的を攻撃する手口","物流倉庫の在庫データを書き換える攻撃","部品の供給を止めて生産を妨害する行為","チェーンメールを転送させる攻撃"],e:"ソフトウェアの更新プログラムに混入させる手口もあります。自社だけでなく取引先を含めた対策が必要です。"},
{s:"atk",u:"人を狙う攻撃",q:"ソーシャルエンジニアリングの例として適切なものは？",c:["システム管理者を装った電話でパスワードを聞き出す","脆弱性を突いてサーバに侵入する","マルウェアを添付したメールを送る","無線LANの通信を傍受する"],e:"技術ではなく人の心理や習慣を突く攻撃。肩越しの盗み見（ショルダーハッキング）やゴミ箱あさりも含まれます。"},
{s:"atk",u:"人を狙う攻撃",q:"スミッシングの説明として適切なものは？",c:["SMS（ショートメッセージ）を使って偽サイトへ誘導する攻撃","スマートウォッチを狙ったマルウェア","笑顔で近づいて建物に侵入する手口","スマホのカメラを遠隔操作する攻撃"],e:"宅配便の不在通知を装う手口が多発しています。SMS内のURLは安易にタップしないことが大切です。"},

{s:"net",u:"FW・IDS・WAF",q:"パケットフィルタリング型ファイアウォールの通過可否の判断基準は？",c:["IPアドレスやポート番号などのヘッダ情報","通信データの中身の文字列","利用者の顔写真","アプリケーションの利用規約"],e:"ヘッダ情報で機械的に判断するため高速ですが、通信内容までは見ません。だからWAFなど他の層の防御も必要です。"},
{s:"net",u:"FW・IDS・WAF",q:"WAFの説明として適切なものは？",c:["Webアプリケーションへの攻撃パターンを検知し、通信を遮断する仕組み","Webサイトの表示を高速化する仕組み","無線LANのアクセスポイントを管理する装置","Webサーバのファイルを自動バックアップする仕組み"],e:"SQLインジェクションやXSSなどをHTTPの内容レベルで検査します。脆弱性修正までの間の保険的対策としても有効です。"},
{s:"net",u:"FW・IDS・WAF",q:"IDSとIPSの違いとして適切なものは？",c:["IDSは不正通信の検知・通知まで、IPSは遮断まで行う","IDSは社内向け、IPSは社外向けである","IDSはハードウェア、IPSはソフトウェアである","IDSは有料、IPSは無料である"],e:"Detection（検知）とPrevention（防止）の違い。IPSは誤検知時に正常通信も止めるリスクがあるため調整が重要です。"},
{s:"net",u:"FW・IDS・WAF",q:"アノマリ型（異常検知型）の検知方式の説明として適切なものは？",c:["正常な状態を学習し、そこから外れた振る舞いを異常として検知する","既知の攻撃パターンと一致する通信を検知する","管理者が目視でログを確認する","ウイルスのハッシュ値と照合する"],e:"未知の攻撃も検知できる可能性がある一方、誤検知が多くなりがち。シグネチャ型と組み合わせて使います。"},
{s:"net",u:"FW・IDS・WAF",q:"DMZ（非武装地帯）の説明として適切なものは？",c:["外部にも内部にも属さない区域に公開サーバを置き、内部ネットワークを守る構成","ファイアウォールを設置しない自由な区域","武器の持ち込みが禁止されたサーバ室","停電時でも稼働する特別な区域"],e:"公開Webサーバが侵害されても、内部LANへ直接侵入されないように分離するのが目的です。"},
{s:"net",u:"FW・IDS・WAF",q:"ゼロトラストの考え方として適切なものは？",c:["社内ネットワークも信頼せず、アクセスのたびに利用者と端末を検証する","誰も信用せずシステムを一切使わせない","信頼できる社員には無制限の権限を与える","ファイアウォールだけですべてを守る"],e:"「境界の内側なら安全」という前提を捨てる考え方。クラウドやテレワークの普及で重要性が増しています。"},
/* ===== ネットワーク防御・VPN・無線LAN ===== */
{s:"net",u:"VPN・無線LAN",q:"IPsecのESPが提供する主な機能は？",c:["パケットの暗号化による機密性の確保","パケットの送信順序の入れ替え","通信速度の向上","IPアドレスの自動割り当て"],e:"ESPは暗号化＋認証を提供します（AHは認証のみ）。トンネルモードでは元のIPヘッダごと暗号化されます。"},
{s:"net",u:"VPN・無線LAN",q:"WPA3がWPA2より強化された点として適切なものは？",c:["SAEにより、パスフレーズを狙うオフライン辞書攻撃への耐性が高まった","電波の届く距離が2倍になった","パスワードなしでも安全に接続できるようになった","有線LANとしても使えるようになった"],e:"WPA2のPSK方式は握手データを収集して辞書攻撃が可能でした。WPA3のSAEはこの弱点を解消しています。"},
{s:"net",u:"VPN・無線LAN",q:"無線LANのセキュリティ対策として効果が【限定的】なものは？",c:["SSIDステルスとMACアドレスフィルタリング","WPA3による暗号化","十分に長く複雑なパスフレーズの設定","認証サーバを使うエンタープライズモード"],e:"SSIDもMACアドレスも電波を観測すれば分かり、MACアドレスは簡単に偽装できます。気休め程度と覚えましょう。"},
{s:"net",u:"VPN・無線LAN",q:"公衆Wi-Fi利用時の対策として最も適切なものは？",c:["VPNで通信全体を暗号化してから利用する","パスワード付きのWi-Fiなら無条件に信頼する","通信速度が速いWi-Fiを選ぶ","SSIDが企業名なら安全と判断する"],e:"偽アクセスポイントはSSIDもパスワードも本物そっくりに用意できます。エンドツーエンドの暗号化が防御の基本です。"},
{s:"net",u:"VPN・無線LAN",q:"検疫ネットワークの説明として適切なものは？",c:["接続してきた端末をまず隔離し、パッチ適用状況などを検査してから社内LANへ入れる仕組み","ウイルス感染した端末を病院へ送る制度","海外から持ち込んだPCを税関で検査する制度","ネットワーク機器を定期的に消毒する作業"],e:"持ち込みPCやテレワーク端末が感染源になるのを防ぎます。基準を満たさない端末は修復用セグメントへ誘導します。"},
/* ===== ネットワーク防御・メールとDNSの防御 ===== */
{s:"net",u:"メールとDNSの防御",q:"SPFの仕組みとして適切なものは？",c:["送信元ドメインのDNSに登録された送信許可IPアドレスと、実際の送信元IPを照合する","メール本文にデジタル署名を付ける","メールを暗号化して送信する","添付ファイルをウイルススキャンする"],e:"ドメインの正規の送信サーバをDNSで公開し、受信側が照合することで送信ドメインのなりすましを検知します。"},
{s:"net",u:"メールとDNSの防御",q:"DKIMの仕組みとして適切なものは？",c:["送信側がメールにデジタル署名を付与し、受信側がDNS上の公開鍵で検証する","送信元のIPアドレスをブラックリストと照合する","メールの件名に認証済みマークを付ける","パスワード付きZIPで添付ファイルを暗号化する"],e:"署名により送信ドメインの正当性と本文の非改ざんを確認できます。SPFと違い転送に強いのも特徴です。"},
{s:"net",u:"メールとDNSの防御",q:"DMARCの説明として適切なものは？",c:["SPFやDKIMの検証に失敗したメールの扱いを、送信ドメイン側がポリシーとして宣言する仕組み","メールの誤送信を取り消す仕組み","メールボックスの容量を制限する仕組み","メールを自動翻訳する仕組み"],e:"none（監視のみ）/quarantine（隔離）/reject（拒否）を宣言し、レポートで詐称状況を把握できます。"},
{s:"net",u:"メールとDNSの防御",q:"OP25Bの説明として適切なものは？",c:["ISPが自網の動的IPアドレスから外部への25番ポート宛て直接送信を遮断する対策","25文字以上のパスワードを義務付ける規約","営業時間外のメール送信を禁止するルール","25MB以上の添付ファイルをブロックする設定"],e:"マルウェア感染PCがメールサーバを介さず直接迷惑メールをばらまくのを防ぐ、ISP側の送信ドメイン対策です。"},
{s:"net",u:"メールとDNSの防御",q:"DNSSECの説明として適切なものは？",c:["デジタル署名によってDNS応答の出自と完全性を検証する仕組み","DNSの問合せ内容を暗号化して秘匿する仕組み","DNSサーバを二重化して可用性を高める構成","ドメイン名を自動で更新する仕組み"],e:"応答が正当な管理者のものであることを検証し、キャッシュポイズニング対策になります。暗号化（秘匿）はしない点に注意！"},
{s:"net",u:"メールとDNSの防御",q:"オープンリゾルバの問題点として適切なものは？",c:["誰からの問合せにも応答するため、リフレクション型DDoSの踏み台に悪用される","応答が速すぎてネットワークが混雑する","ドメイン名を勝手に登録されてしまう","利用料金が高額になる"],e:"キャッシュDNSサーバは自組織内からの問合せだけに応答するよう制限するのが鉄則です。"},
/* ===== セキュア開発・Webセキュア実装 ===== */
{s:"dev",u:"Webセキュア実装",q:"SQLインジェクションの最も根本的な対策は？",c:["プレースホルダ（プリペアドステートメント）を使用する","WAFを導入する","入力できる文字数を制限する","エラーメッセージを表示しない"],e:"SQL文の構造と値を分離するのが根本対策。WAFやエラー非表示は保険的対策にすぎません。"},
{s:"dev",u:"Webセキュア実装",q:"XSSの基本的な対策として適切なものは？",c:["HTMLへ出力する際に「<」「>」「&」「\"」などを エスケープする","JavaScriptの使用を全面的に禁止する","クッキーを使わないようにする","通信をすべてHTTPSにする"],e:"「入力時」でなく「出力時」にエスケープするのがポイント。加えてCSPやHttpOnly属性で多層防御します。"},
{s:"dev",u:"Webセキュア実装",q:"クッキーのHttpOnly属性の効果として適切なものは？",c:["JavaScriptからクッキーを読み取れなくし、XSSによるセッション窃取を軽減する","HTTP通信のときだけクッキーを送信させる","クッキーを暗号化して保存する","クッキーの有効期限を無期限にする"],e:"XSSがあってもdocument.cookieでセッションIDを盗まれにくくなります。Secure属性（HTTPS限定送信）との混同に注意！"},
{s:"dev",u:"Webセキュア実装",q:"クッキーのSecure属性の効果として適切なものは？",c:["HTTPS通信のときだけクッキーを送信させる","クッキーの内容を自動で暗号化する","JavaScriptからのアクセスを禁止する","クッキーを安全なフォルダに保存する"],e:"平文のHTTP通信でクッキーが送信されて盗聴されるのを防ぎます。HttpOnly属性とセットで設定するのが定石です。"},
{s:"dev",u:"Webセキュア実装",q:"CSRFの対策として適切なものは？",c:["正規フォームに秘密のトークンを埋め込み、リクエスト時に照合する","パスワードの最低文字数を増やす","通信をTLSで暗号化する","セッションの有効期限を延ばす"],e:"攻撃者が知り得ないトークンの一致を確認することで、罠サイト経由の偽リクエストを排除できます。"},
{s:"dev",u:"Webセキュア実装",q:"Webアプリでのパスワードの適切な保存方法は？",c:["ソルトを付けてストレッチングしたハッシュ値を保存する","平文のままアクセス制限をかけて保存する","可逆暗号で暗号化して鍵と一緒に保存する","パスワードの先頭4文字だけ保存する"],e:"漏えいしても元のパスワードを割り出されにくくします。bcryptやArgon2などの専用アルゴリズムが推奨です。"},
{s:"dev",u:"Webセキュア実装",q:"エラーメッセージの適切な扱いはどれ？",c:["スタックトレースやSQL文などの内部情報を利用者に表示しない","詳しい原因をすべて画面に表示して親切にする","エラーが起きても何も表示せず処理を続行する","エラー内容を全利用者にメールで通知する"],e:"内部情報は攻撃者へのヒントになります。利用者には簡潔な案内、詳細はサーバ側のログにだけ記録します。"},
{s:"dev",u:"Webセキュア実装",q:"Content Security Policy（CSP）の説明として適切なものは？",c:["許可した供給元以外のスクリプト実行などをブラウザに禁止させるHTTPヘッダ","サーバのコンテンツを自動でバックアップするポリシー","コンテンツの著作権を保護する電子透かし","アクセス数に応じて課金するポリシー"],e:"XSSが成立しても不正スクリプトの実行を止められる多層防御の一つです。"},
/* ===== セキュア開発・開発と診断 ===== */
{s:"dev",u:"開発と診断",q:"セキュリティバイデザインの説明として適切なものは？",c:["企画・設計の段階からセキュリティを組み込む考え方","デザイン性の高いセキュリティ製品を選ぶこと","リリース後にセキュリティ機能を追加すること","デザイナーがセキュリティ担当を兼任すること"],e:"後付けの対策は高コストで漏れも出ます。上流工程からの組み込みが結局いちばん安くて確実です。"},
{s:"dev",u:"開発と診断",q:"ファジングの説明として適切なものは？",c:["問題を起こしそうなデータを大量に自動入力し、異常動作を検出するテスト","あいまいな仕様書を明確にする作業","ソースコードを人間が目視レビューすること","本番環境で実際に攻撃してみるテスト"],e:"極端に長い文字列や不正な形式のデータを機械的に投入して、未知の脆弱性を洗い出す手法です。"},
{s:"dev",u:"開発と診断",q:"脆弱性診断とペネトレーションテストの違いとして適切なものは？",c:["診断は脆弱性を網羅的に洗い出し、ペネトレは目的を定めて実際に侵入できるか検証する","診断は有料、ペネトレは無料である","診断は攻撃者が行い、ペネトレは防御側が行う","両者に違いはなく呼び方だけの問題である"],e:"ペネトレは「機密情報に到達できるか」など目的達成型。攻撃者の視点で防御全体の実効性を試します。"},
{s:"dev",u:"開発と診断",q:"CVSSの説明として適切なものは？",c:["脆弱性の深刻度を0.0〜10.0のスコアで表す共通評価手法","ウイルスの感染力を5段階で表す指標","セキュリティ製品の性能ランキング","脆弱性を発見した人に払う報奨金の相場表"],e:"攻撃のしやすさや影響から算出します。対応優先度の判断材料として世界共通で使われています。"},
{s:"dev",u:"開発と診断",q:"ソフトウェアの脆弱性が見つかったとき、根本的対策はどれ？",c:["脆弱性を修正したバージョンへ更新する","WAFで攻撃パターンを遮断する","IDSで攻撃を監視する","アクセスログの保存期間を延ばす"],e:"WAFやIDSは修正までの時間を稼ぐ保険的対策。根本対策はパッチ適用・コード修正です。この区別は午後問題でも頻出！"},
{s:"dev",u:"開発と診断",q:"開発中の脆弱性を早期に発見する取り組みとして適切なものは？",c:["ソースコードの静的解析をCI（継続的インテグレーション）に組み込む","リリース直前に一度だけ全機能をテストする","脆弱性対応はすべて運用チームに任せる","エラーが出なければ安全と判断する"],e:"コミットのたびに自動検査すれば、修正コストが最も安い段階で問題を潰せます。"},
/* ===== 管理・法規・ISMSとリスク管理 ===== */
{s:"law",u:"ISMSとリスク管理",q:"情報セキュリティの3要素（CIA）の組合せとして正しいものは？",c:["機密性・完全性・可用性","機密性・確実性・安全性","隠匿性・完全性・信頼性","機密性・整合性・拡張性"],e:"Confidentiality（機密性）、Integrity（完全性）、Availability（可用性）。すべての基本となる考え方です。"},
{s:"law",u:"ISMSとリスク管理",q:"情報セキュリティの「真正性」の説明として適切なものは？",c:["利用者や情報が、主張どおり本物であることが確認できる性質","情報が正しい日本語で書かれている性質","情報が最新の状態に保たれている性質","情報に嘘が含まれていない性質"],e:"エンティティ（人・機器・情報）が本物かを確認できること。認証技術で実現します。7要素のひとつです。"},
{s:"law",u:"ISMSとリスク管理",q:"リスクアセスメントの正しいプロセスの順序は？",c:["リスク特定 → リスク分析 → リスク評価","リスク評価 → リスク特定 → リスク分析","リスク分析 → リスク対応 → リスク特定","リスク受容 → リスク分析 → リスク移転"],e:"まず洗い出し（特定）、大きさを見積もり（分析）、対応の優先度を決める（評価）。この順序は頻出です！"},
{s:"law",u:"ISMSとリスク管理",q:"リスク対応のうち「リスク移転（共有）」の例として適切なものは？",c:["サイバー保険に加入して損害の負担を移す","リスクの高い事業から撤退する","セキュリティ対策を強化して発生確率を下げる","影響が小さいのでそのまま受け入れる"],e:"回避・低減・移転・保有の4分類はセットで覚えましょう。撤退は回避、対策強化は低減、受け入れは保有です。"},
{s:"law",u:"ISMSとリスク管理",q:"「リスク保有（受容）」を選択するのはどんな場合？",c:["リスクの影響が小さく、対策コストが見合わないと判断した場合","対策方法が思いつかない場合","経営層がリスクに関心がない場合","保険に加入できなかった場合"],e:"意図的・合理的にリスクを受け入れる経営判断です。「何もしない」のではなく「検討した上で持つ」のがポイント。"},
{s:"law",u:"ISMSとリスク管理",q:"情報セキュリティポリシーの一般的な3階層構造は？",c:["基本方針・対策基準・実施手順","憲法・法律・条例","戦略・戦術・作戦","規程・規約・契約"],e:"経営層が定める基本方針の下に、何を守るかの対策基準、具体的なやり方の実施手順がぶら下がる構造です。"},
{s:"law",u:"ISMSとリスク管理",q:"ISMS認証（ISO/IEC 27001）の説明として適切なものは？",c:["組織のセキュリティ管理の仕組みが規格に適合していると第三者が認証する制度","製品にウイルスが含まれていないことを国が保証する制度","個人のセキュリティ知識を認定する資格試験","Webサイトの安全性を示すマークを表示する制度"],e:"「仕組み（マネジメントシステム）」の認証であり、事故が絶対起きない保証ではない点がよく問われます。"},
{s:"law",u:"ISMSとリスク管理",q:"残留リスクの説明として適切なものは？",c:["対策を講じたあとになお残るリスク","まだ発見されていないリスク","過去に発生して解決済みのリスク","他社に移転したリスク"],e:"リスクをゼロにはできないため、残留リスクを把握し、経営層が受容可能か判断することが重要です。"},
/* ===== 管理・法規・法律と制度 ===== */

/* ============ 学習エンジン（間隔反復・Leitner+SM-2簡易版） ============ */
const DAY = 24*60*60*1000;
const INTERVALS = [0, 1, 3, 7, 14, 30]; // stage→次に出すまでの日数
const MASTER_STAGE = 3;                 // 7日以上あけて思い出せた＝マスター扱い
const QUEST_SIZE = 10, PRACTICE_SIZE = 8;
const MOCK_SIZE = 25, MOCK_PASS = 15;   // 午前II: 25問・60%で合格

const KEY = "scQuestV1";
let S = load();
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(KEY));
    if(d && d.items) return d;
  }catch(e){}
  return {xp:0, answered:0, correct:0, reviewDone:0, sessions:0,
          streak:0, lastDay:null, badges:[], perfectRuns:0, items:{}, sound:true,
          mockRuns:0, mockPass:0, mockBest:0, examDate:null};
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }

function dueIds(){
  const now = Date.now();
  return Object.keys(S.items).filter(id => S.items[id].due <= now).map(Number);
}
function newIds(){
  return BANK.map((_,i)=>i).filter(i => !S.items[i]);
}
function scheduleAnswer(id, firstTryCorrect, retried){
  let st = S.items[id];
  if(!st){ st = S.items[id] = {stage:0, due:0, seen:0, right:0, wrong:0}; }
  st.seen++;
  if(firstTryCorrect){
    st.right++;
    st.stage = Math.min(st.stage+1, INTERVALS.length-1);
  }else if(retried){ // セッション内で間違えたあと正解
    st.right++;
    st.stage = 1;
  }else{ // 間違い
    st.wrong++;
    st.stage = 0;
  }
  st.due = Date.now() + INTERVALS[st.stage]*DAY;
  save();
}
function touchStreak(){
  const today = todayStr();
  if(S.lastDay !== today){
    const y = new Date(); y.setDate(y.getDate()-1);
    const yStr = y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
    S.streak = (S.lastDay===yStr) ? S.streak+1 : 1;
    S.lastDay = today;
  }
}

/* レベル: 必要XPが少しずつ増える */
const TITLES = ["見習いセキュリティ担当","ジュニアアナリスト","アナリスト","脆弱性ハンター","ディフェンダー","インシデントレスポンダー","セキュリティアーキテクト","ホワイトハットの達人","CISOの右腕","登録セキスペの器"];
function levelInfo(xp){
  let lvl=1, need=100, base=0;
  while(xp >= base+need){ base+=need; lvl++; need=100+ (lvl-1)*40; }
  return {lvl, cur:xp-base, need, title:TITLES[Math.min(TITLES.length-1, Math.floor((lvl-1)/3))]};
}

/* ============ 効果音（WebAudio） ============ */
let audioCtx = null;
function beep(freqs, dur){
  if(!S.sound) return;
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    freqs.forEach((f,i)=>{
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type="sine"; o.frequency.value=f;
      g.gain.setValueAtTime(0.12, audioCtx.currentTime + i*dur);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (i+1)*dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(audioCtx.currentTime + i*dur); o.stop(audioCtx.currentTime + (i+1)*dur);
    });
  }catch(e){}
}
const soundOK = ()=>beep([660,880],0.12);
const soundNG = ()=>beep([220,180],0.18);
const soundLv = ()=>beep([523,659,784,1047],0.13);

/* ============ ユーティリティ ============ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
/* 同じ分野が連続しないように並べ替え（インターリービング） */
function interleave(ids){
  const pool = shuffle(ids), out = [];
  while(pool.length){
    let idx = pool.findIndex(id => !out.length || BANK[id].s !== BANK[out[out.length-1]].s);
    if(idx === -1) idx = 0;
    out.push(pool.splice(idx,1)[0]);
  }
  return out;
}
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtTime(ms){ const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }

function renderTrain(){

  BANK.forEach((q,i)=>{

  });
  const byCat = {};
  Object.values(units).forEach(u=>{ (byCat[u.s]=byCat[u.s]||[]).push(u); });

  app.innerHTML = `<h1 style="margin-bottom:12px">💪 分野べつ特訓</h1>

    Object.entries(CATS).map(([key,cat])=>`
      <div class="card">

window.startPractice = (s,u)=>{
  const ids = BANK.map((q,i)=>[q,i]).filter(([q])=>q.s===s&&q.u===u).map(([,i])=>i);
  // 未学習・低ステージ優先で出題
  ids.sort((a,b)=>{
    const sa=S.items[a]?S.items[a].stage:-1, sb=S.items[b]?S.items[b].stage:-1;
    return sa-sb || Math.random()-0.5;
  });
  startSession(shuffle(ids.slice(0,PRACTICE_SIZE)), `${CATS[s].name}・${u} 特訓`);
};

/* ---- クエスト開始 ---- */
window.startQuest = ()=>{
  const due = shuffle(dueIds()).slice(0, QUEST_SIZE);
  let queue = due.slice();
  if(queue.length < QUEST_SIZE){
    // 分野がかたよらないよう新規問題をラウンドロビンで補充
    const fresh = newIds();
    const byCat = {};
    shuffle(fresh).forEach(i=>{ (byCat[BANK[i].s]=byCat[BANK[i].s]||[]).push(i); });
    const cats = shuffle(Object.keys(byCat));
    let k=0;
    while(queue.length < QUEST_SIZE && cats.some(s=>byCat[s].length)){
      const s = cats[k++ % cats.length];
      if(byCat[s].length) queue.push(byCat[s].pop());
    }
  }
  if(!queue.length){ alert("今日の問題はすべてクリア済み！模試に挑戦するか、また明日きてね🌙"); return; }
  startSession(interleave(queue), "今日のクエスト");
};

/* ---- セッション（出題エンジン） ---- */
let sess = null;
function startSession(ids, title){
  if(!ids.length){ go("home"); return; }
  sess = {
    title, queue:ids.slice(), total:ids.length,
    wrongOnce:new Set(), cleared:new Set(),
    firstTryCorrect:0, gainedXp:0,
    answeredThisQ:false,
  };
  nextQuestion();
}
function nextQuestion(){
  if(!sess.queue.length){ finishSession(); return; }
  const id = sess.queue[0];
  const q = BANK[id];
  const cat = CATS[q.s];
  // 選択肢シャッフル（c[0]が正解）
  const order = shuffle([0,1,2,3]);
  sess.currentOrder = order;
  sess.answeredThisQ = false;

  const pct = Math.round(sess.cleared.size / sess.total * 100);
  app.innerHTML = `
    <div class="row">
      <button class="btn-ghost" onclick="quitSession()">✕ やめる</button>
      <div class="grow"></div>
      <span class="pill">${esc(sess.title)}</span>
    </div>
    <div class="progress"><div style="width:${pct}%"></div></div>
    <div class="sub center">${sess.cleared.size} / ${sess.total} クリア ${sess.wrongOnce.has(id)?"（リベンジ問題！）":""}</div>
    <div class="card" style="margin-top:12px">
      <div class="row">
        <span class="pill" style="border-color:${cat.color};color:${cat.color}">${cat.emoji} ${cat.name}｜${esc(q.u)}</span>
        <div class="grow"></div>
        ${S.items[id]?'<span class="duechip">🔁 復習</span>':'<span class="duechip">✨ 新問題</span>'}
      </div>
      <div class="qtext">${esc(q.q)}</div>
      <div id="choices">
        ${order.map((ci,pos)=>`<button class="choice" id="ch${pos}" onclick="answer(${pos})">${"❶❷❸❹"[pos]} ${esc(q.c[ci])}</button>`).join("")}
      </div>
      <div id="fb"></div>
    </div>
    <div class="sub center">キーボードの 1〜4 でも答えられます</div>`;
}
window.quitSession = ()=>{ if(confirm("クエストを中断しますか？（ここまでの記録は保存済み）")) go("home"); };

window.answer = (pos)=>{
  if(!sess || sess.answeredThisQ) return;
  sess.answeredThisQ = true;
  const id = sess.queue.shift();
  const q = BANK[id];
  const chosen = sess.currentOrder[pos];
  const correct = (chosen === 0);
  const correctPos = sess.currentOrder.indexOf(0);
  const wasWrongBefore = sess.wrongOnce.has(id);
  const wasReview = !!S.items[id];

  for(let p=0;p<4;p++){
    const el = document.getElementById("ch"+p);
    el.disabled = true;
    if(p===correctPos) el.classList.add("correct");
    else if(p===pos) el.classList.add("wrong");
    else el.classList.add("dim");
  }

  let fbHtml;
  if(correct){
    soundOK();
    const xp = wasWrongBefore ? 5 : 10;
    S.xp += xp; sess.gainedXp += xp;
    S.answered++; S.correct++;
    if(!wasWrongBefore) sess.firstTryCorrect++;
    if(wasReview && !wasWrongBefore) S.reviewDone++;
    sess.cleared.add(id);
    scheduleAnswer(id, !wasWrongBefore, wasWrongBefore);
    const st = S.items[id];
    const days = INTERVALS[st.stage];
    fbHtml = `<div class="feedback ok"><b>⭕ 正解！ +${xp} XP</b><br>${esc(q.e)}<br>
      <span class="sub">📅 次の復習：${days===0?"今日中":days+"日後"}（思い出す間隔を少しずつ広げると記憶が長持ちします）</span></div>
      <button class="btn-main" onclick="nextQuestion()">次へ ▶</button>`;
  }else{
    soundNG();
    S.answered++;
    sess.wrongOnce.add(id);
    sess.queue.push(id); // セッションの最後に再挑戦（正解するまで終わらない）
    scheduleAnswer(id, false, false);
    fbHtml = `<div class="feedback ng"><b>❌ ざんねん…正解は「${esc(q.c[0])}」</b><br>${esc(q.e)}<br>
      <span class="sub">🔁 この問題はクエストの最後にもう一度出ます。自力で思い出せたら記憶に残ります！</span></div>
      <button class="btn-main" onclick="nextQuestion()">次へ ▶</button>`;
  }
  save();
  document.getElementById("fb").innerHTML = fbHtml;
};

document.addEventListener("keydown",(ev)=>{

  let pool = [];
  Object.keys(byCat).forEach(c=>{ pool.push(...shuffle(byCat[c]).slice(0,3)); });
  const rest = shuffle(BANK.map((_,i)=>i).filter(i=>!pool.includes(i))).slice(0, MOCK_SIZE-pool.length);
  pool = shuffle(pool.concat(rest));

  mock = {queue:pool, idx:0, correctCount:0, gainedXp:0, start:Date.now(),

/* ---- 端末間同期 ---- */
const SYNC_PREFIX = "SCQ1.";
function encodeState(){
  return SYNC_PREFIX + btoa(unescape(encodeURIComponent(JSON.stringify(S))));
}
function mergeState(a,b){
  const m = {...a};
  ["xp","answered","correct","reviewDone","sessions","perfectRuns","mockRuns","mockPass","mockBest","streak"]
    .forEach(k=>{ m[k] = Math.max(a[k]||0, b[k]||0); });
  m.lastDay = [a.lastDay,b.lastDay].filter(Boolean).sort().pop() || null;
  m.badges = [...new Set([...(a.badges||[]), ...(b.badges||[])])];
  m.examDate = a.examDate || b.examDate || null;
  m.items = {...a.items};
  Object.entries(b.items||{}).forEach(([id,st])=>{
    const cur = m.items[id];
    if(!cur){ m.items[id] = st; return; }
    // 学習が進んでいる方（挑戦回数が多い方、同数なら復習ステージが高い方）を採用
    const pick = (st.seen>cur.seen || (st.seen===cur.seen && st.stage>cur.stage)) ? st : cur;
    m.items[id] = {...pick,
      seen:Math.max(cur.seen,st.seen), right:Math.max(cur.right,st.right), wrong:Math.max(cur.wrong,st.wrong)};
  });
  return m;
}
window.exportSync = async ()=>{
  const code = encodeState();
  try{
    await navigator.clipboard.writeText(code);
    alert("同期コードをコピーしました！\nもう一方の端末の「同期コードを取り込む」に貼り付けてください。\n（同じApple IDのiPhone⇄iPadなら、そのまま相手の端末で貼り付けできます）");
  }catch(e){
    prompt("自動コピーできなかったので、このコードを全選択してコピーしてください", code);
  }
};

/* 取り込みデータの検証・無害化（細工された同期コード対策） */
function sanitizeImport(d){
  const num = (v,max)=>{ v=Number(v); return (Number.isFinite(v)&&v>0) ? Math.min(v,max) : 0; };
  const date = (v)=>(typeof v==="string" && /^\d{4}-\d{2}-\d{2}$/.test(v)) ? v : null;
  const out = {
    xp:num(d.xp,1e9), answered:num(d.answered,1e9), correct:num(d.correct,1e9),
    reviewDone:num(d.reviewDone,1e9), sessions:num(d.sessions,1e9),
    perfectRuns:num(d.perfectRuns,1e9), mockRuns:num(d.mockRuns,1e9), mockPass:num(d.mockPass,1e9),
    mockBest:num(d.mockBest,100), streak:num(d.streak,1e6),
    lastDay:date(d.lastDay), examDate:date(d.examDate),
    badges:Array.isArray(d.badges) ? d.badges.filter(id=>BADGES.some(b=>b.id===id)) : [],
    items:{}, sound:true,
  };
  Object.entries((d.items && typeof d.items==="object") ? d.items : {}).forEach(([id,st])=>{
    const i = Number(id);
    if(!Number.isInteger(i) || i<0 || i>=BANK.length || !st || typeof st!=="object") return;
    out.items[i] = {stage:num(st.stage, INTERVALS.length-1), due:num(st.due, 9e15),
                    seen:num(st.seen,1e9), right:num(st.right,1e9), wrong:num(st.wrong,1e9)};
  });
  return out;
}
window.importSync = ()=>{
  const v = prompt("もう一方の端末でコピーした同期コードを、ここに貼り付けてください");
  if(!v) return;
  const t = v.trim();
  if(!t.startsWith(SYNC_PREFIX)){ alert("同期コードの形式が違うようです。コード全体（SCQ1.から最後まで）を貼り付けてね"); return; }
  let d;
  try{ d = JSON.parse(decodeURIComponent(escape(atob(t.slice(SYNC_PREFIX.length))))); }
  catch(e){ alert("コードを読み取れませんでした。コピーが途中で切れていないか確認してね"); return; }
  if(!d || typeof d!=="object" || !d.items){ alert("このコードは支援士クエストの記録ではないようです"); return; }
  S = mergeState(S, sanitizeImport(d));
  save();
  alert("同期完了！両端末の良いほうの記録を合体しました💪");
  go("home");
};
